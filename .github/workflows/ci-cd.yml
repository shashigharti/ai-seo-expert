name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: python -m pytest -q

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  # Deploys to a single free-tier Alibaba Cloud ECS instance per
  # docs/deployment.md §7 - pulls the new commit and rebuilds via
  # docker-compose.prod.yml, matching the manual redeploy steps in §7.6.
  # Requires repo secrets: ALIBABA_ECS_HOST, ALIBABA_ECS_USER,
  # ALIBABA_ECS_SSH_KEY, and ALIBABA_ECS_DEPLOY_PATH (path to the cloned
  # repo on the instance, e.g. /home/<user>/aiseo-expert).
  deploy:
    needs: [backend-test, frontend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to Alibaba Cloud ECS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ALIBABA_ECS_HOST }}
          username: ${{ secrets.ALIBABA_ECS_USER }}
          key: ${{ secrets.ALIBABA_ECS_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.ALIBABA_ECS_DEPLOY_PATH }}"
            git fetch origin master
            git reset --hard origin/master
            docker compose -f docker-compose.prod.yml up -d --build
